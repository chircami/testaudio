<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https: data: blob:">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audio Test Final</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:16px}
button{display:block;width:100%;padding:16px;margin:8px 0;font-size:17px;border:none;border-radius:12px;cursor:pointer;font-weight:bold}
.log{background:#1a1a1a;padding:10px;border-radius:8px;font-size:12px;height:280px;overflow-y:auto;margin-top:10px;font-family:monospace;word-break:break-all}
</style>
</head>
<body>
<h2>🎵 Audio Test Final</h2>
<button onclick="testDirect()" style="background:#2dd4bf;color:#000">TEST 1: iTunes directo → play</button>
<button onclick="testProxy()" style="background:#f5c842;color:#000">TEST 2: allorigins → play</button>
<button onclick="testBoth()" style="background:#9b5de5">TEST 3: directo con fallback proxy</button>
<button onclick="stopAudio()" style="background:#444">⏹ Stop</button>
<div class="log" id="log"></div>
<script>
var ael = new Audio();
ael.addEventListener('playing', function(){ log('✅ PLAYING!', '#4ade80'); });
ael.addEventListener('error',   function(){ log('❌ Audio error code='+(ael.error?ael.error.code:'?'), '#e8407a'); });

function log(msg,color){
  var d=document.getElementById('log');
  d.innerHTML='<div style="color:'+(color||'#fff')+'">'+new Date().toTimeString().substr(0,8)+' '+msg+'</div>'+d.innerHTML;
}

var BASE = 'https://itunes.apple.com/search?term=Bohemian+Rhapsody+Queen&media=music&entity=song&limit=5';

function playUrl(url) {
  log('Playing: '+url.substr(0,60)+'…','#aaa');
  ael.src = url;
  ael.play().then(function(){ log('✅ play() resolved','#4ade80'); })
            .catch(function(e){ log('❌ play() '+e.name+': '+e.message,'#e8407a'); });
}

function testDirect() {
  log('--- TEST 1: iTunes directo ---');
  fetch(BASE)
    .then(function(r){ log('HTTP '+r.status); return r.json(); })
    .then(function(d){
      var tr=(d.results||[]).find(function(x){ return x.previewUrl; });
      if(tr) playUrl(tr.previewUrl);
      else log('❌ No preview','#e8407a');
    })
    .catch(function(e){ log('❌ fetch: '+e.name+': '+e.message,'#e8407a'); });
}

function testProxy() {
  log('--- TEST 2: allorigins proxy ---');
  fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(BASE))
    .then(function(r){ log('HTTP '+r.status); return r.json(); })
    .then(function(d){
      var tr=(d.results||[]).find(function(x){ return x.previewUrl; });
      if(tr) playUrl(tr.previewUrl);
      else log('❌ No preview','#e8407a');
    })
    .catch(function(e){ log('❌ fetch: '+e.name+': '+e.message,'#e8407a'); });
}

function testBoth() {
  log('--- TEST 3: directo + fallback ---');
  fetch(BASE)
    .then(function(r){ log('Directo HTTP '+r.status,'#4ade80'); return r.json(); })
    .then(function(d){
      var tr=(d.results||[]).find(function(x){ return x.previewUrl; });
      if(tr){ log('✅ Directo OK','#4ade80'); playUrl(tr.previewUrl); }
      else useProxy();
    })
    .catch(function(){ log('Directo falló → proxy…','#f5c842'); useProxy(); });
}

function useProxy() {
  fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(BASE))
    .then(function(r){ log('Proxy HTTP '+r.status); return r.json(); })
    .then(function(d){
      var tr=(d.results||[]).find(function(x){ return x.previewUrl; });
      if(tr){ log('✅ Proxy OK','#4ade80'); playUrl(tr.previewUrl); }
      else log('❌ No preview en proxy','#e8407a');
    })
    .catch(function(e){ log('❌ Proxy: '+e.name,'#e8407a'); });
}

function stopAudio(){ ael.pause(); ael.src=''; }
log('Listo. Toca un test.','#aaa');
</script>
</body>
</html>
